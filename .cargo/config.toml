[target.'cfg(all(target_arch = "arm", target_os = "none"))']
runner = "probe-run --chip STM32L486rg"

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C", "link-arg=-Tlink.x",
]

[alias]
t = "test --lib"
b = "build --target thumbv7em-none-eabihf"
bd = "build --target thumbv7em-none-eabihf --release"
