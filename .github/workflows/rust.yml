name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JUST_HOST_TARGET: x86_64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@v4
    - name: Setup targets
      run: rustup target add thumbv7em-none-eabihf

    - name: Install `zsh` and `just`
      run: |
        sudo apt-get update
        sudo apt-get install -y zsh just

    - name: Build
      run: cargo build --verbose

    - name: CI Tests
      run: just ci
